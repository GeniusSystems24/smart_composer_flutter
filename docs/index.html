<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SmartComposer — GeniusLink</title>

<link rel="stylesheet" href="_ds/geniuslink-design-system-ed61ebae-3f97-4399-9406-ae6ffb2508bf/colors_and_type.css" />
<link rel="stylesheet" href="_ds/geniuslink-design-system-ed61ebae-3f97-4399-9406-ae6ffb2508bf/design_system/tokens.css" />
<link rel="stylesheet" href="composer/composer.css" />

<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body { background: var(--gl-bg); color: var(--gl-fg-1); font-family: var(--gl-font-body); }
  ::selection { background: rgba(74,124,255,.3); }

  /* section-marker pill */
  .gl-mk { display: inline-block; width: 4px; height: 13px; border-radius: 12px; vertical-align: -2px; margin-right: 8px; }
  .gl-mk--blue { background: var(--gl-marker-blue); }
  .gl-mk--green { background: var(--gl-marker-green); }
  .gl-mk--orange { background: var(--gl-marker-orange); }

  .pg-eyebrow { display: inline-flex; align-items: center; font-size: 11px; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: var(--gl-fg-3); }

  /* ---------- shell ---------- */
  .pg-shell { min-height: 100vh; display: flex; flex-direction: column; }
  .pg-head {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; gap: 24px;
    padding: 14px clamp(16px, 4vw, 56px);
    background: color-mix(in srgb, var(--gl-bg) 86%, transparent);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--gl-border);
  }
  .pg-brand { display: flex; align-items: center; gap: 12px; }
  .pg-brand__t { font-family: var(--gl-font-display); font-weight: 700; font-size: 17px; letter-spacing: -.02em; }
  .pg-brand__s { font-size: 11px; color: var(--gl-fg-3); }
  .pg-ver { font-family: var(--gl-font-mono); font-size: 10px; color: var(--gl-fg-3); border: 1px solid var(--gl-border-strong); border-radius: 4px; padding: 2px 6px; margin-left: 4px; }

  /* isometric cube logo */
  .pg-cube { position: relative; width: 30px; height: 30px; flex: 0 0 auto; }
  .pg-cube__f { position: absolute; left: 50%; }
  .pg-cube__top { top: 1px; transform: translateX(-50%); width: 17px; height: 17px; background: var(--gl-blue-200); transform: translateX(-50%) rotate(45deg) skew(-8deg,-8deg); }
  .pg-cube__left { top: 9px; transform: translateX(-100%); width: 14px; height: 15px; background: var(--gl-blue-500); clip-path: polygon(0 18%,100% 0,100% 82%,0 100%); }
  .pg-cube__right { top: 9px; width: 14px; height: 15px; background: #8B7CF6; clip-path: polygon(0 0,100% 18%,100% 100%,0 82%); }

  .pg-tabs { display: flex; gap: 4px; }
  .pg-tab { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 13px; border: none; background: none; color: var(--gl-fg-3); font-family: var(--gl-font-body); font-size: 13px; font-weight: 600; border-radius: 7px; cursor: pointer; transition: .14s ease; }
  .pg-tab:hover { color: var(--gl-fg-1); background: var(--gl-hover); }
  .pg-tab.is-on { color: var(--gl-blue-500); background: color-mix(in srgb, var(--gl-blue-500) 14%, transparent); }
  .pg-theme { margin-left: auto; width: 36px; height: 36px; display: grid; place-items: center; border: 1px solid var(--gl-border-strong); background: var(--gl-surface); color: var(--gl-fg-2); border-radius: 8px; cursor: pointer; flex: 0 0 auto; }
  .pg-theme:hover { color: var(--gl-fg-1); border-color: var(--gl-blue-500); }

  /* ---------- mobile tab dropdown (hidden on desktop, shown ≤820px) ---------- */
  .pg-tabsel { display: none; position: relative; }
  .pg-tabsel__btn {
    display: inline-flex; align-items: center; gap: 8px; height: 38px; padding: 0 12px;
    border: 1px solid var(--gl-border-strong); background: var(--gl-surface); color: var(--gl-fg-1);
    border-radius: 8px; font-family: var(--gl-font-body); font-size: 13px; font-weight: 600; cursor: pointer;
    transition: border-color .12s ease;
  }
  .pg-tabsel__btn:hover { border-color: var(--gl-blue-500); }
  .pg-tabsel__btn > svg:first-child { color: var(--gl-blue-500); }
  .pg-tabsel__lbl { white-space: nowrap; }
  .pg-tabsel__chev { color: var(--gl-fg-3); transition: transform .15s ease; }
  .pg-tabsel__chev.is-open { transform: rotate(180deg); }
  .pg-tabsel__menu {
    position: absolute; top: calc(100% + 8px); right: 0; z-index: 200; min-width: 220px;
    background: var(--gl-surface); border: 1px solid var(--gl-border-strong); border-radius: 10px;
    box-shadow: var(--gl-shadow-pop); padding: 6px; display: flex; flex-direction: column; gap: 2px;
    animation: pg-drop .14s ease-out;
  }
  @keyframes pg-drop { from { opacity: 0; transform: translateY(-6px); } }
  .pg-tabsel__item {
    display: flex; align-items: center; gap: 10px; width: 100%; min-height: 44px; padding: 0 10px;
    border: none; background: none; color: var(--gl-fg-2); font-family: var(--gl-font-body);
    font-size: 14px; font-weight: 600; border-radius: 7px; cursor: pointer; text-align: left; transition: .12s ease;
  }
  .pg-tabsel__item:hover { background: var(--gl-hover); color: var(--gl-fg-1); }
  .pg-tabsel__item.is-on { color: var(--gl-blue-500); background: color-mix(in srgb, var(--gl-blue-500) 12%, transparent); }
  .pg-tabsel__chk { margin-left: auto; color: var(--gl-blue-500); }

  .pg-body { flex: 1; padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 56px) 80px; max-width: 1320px; width: 100%; margin: 0 auto; }

  /* ---------- responsive shell: tab strip → dropdown menu ---------- */
  @media (max-width: 820px) {
    .pg-head { padding: 12px clamp(16px, 4vw, 32px); }
    .pg-tabs { display: none; }
    .pg-tabsel { display: block; margin-left: auto; }
    .pg-theme { margin-left: 8px; }
  }
  @media (max-width: 460px) {
    .pg-brand__s { display: none; }
    .pg-ver { display: none; }
    .pg-head { padding: 12px 16px; gap: 12px; }
    .pg-brand__t { font-size: 16px; }
    /* compact dropdown — icon + chevron only */
    .pg-tabsel__lbl { display: none; }
    .pg-tabsel__btn { padding: 0 10px; gap: 6px; }
  }

  /* ---------- intro ---------- */
  .pg-intro { margin-bottom: 28px; max-width: 720px; }
  .pg-h1 { font-family: var(--gl-font-display); font-weight: 800; font-size: clamp(28px, 4vw, 40px); letter-spacing: -.03em; margin: 12px 0 10px; line-height: 1.05; }
  .pg-lede { font-size: 15px; line-height: 1.6; color: var(--gl-fg-2); margin: 0; text-wrap: pretty; }

  /* ---------- playground ---------- */
  .pg-grid { display: grid; grid-template-columns: minmax(0,1fr) 320px; gap: 24px; align-items: start; }
  .pg-panel__body { display: block; }
  @media (max-width: 940px) {
    .pg-grid { grid-template-columns: 1fr; }
    /* panel becomes a collapsible card stacked under the composer */
    .pg-panel { position: static; top: auto; }
    .pg-panel__h--toggle { cursor: pointer; }
    .pg-panel__chev { display: block; }
    .pg-panel.is-collapsed .pg-panel__h--toggle { margin-bottom: 0; }
    .pg-panel.is-collapsed .pg-panel__chev { transform: rotate(-90deg); }
    .pg-panel.is-collapsed .pg-panel__body { display: none; }
  }

  .pg-stage-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; gap: 12px; flex-wrap: wrap; }
  .pg-stage-actions { display: flex; gap: 8px; }
  .pg-mini { display: inline-flex; align-items: center; gap: 6px; height: 30px; padding: 0 10px; border: 1px solid var(--gl-border-strong); background: var(--gl-surface); color: var(--gl-fg-2); border-radius: 6px; font-family: var(--gl-font-body); font-size: 12px; font-weight: 600; cursor: pointer; }
  .pg-mini:hover { color: var(--gl-fg-1); border-color: var(--gl-blue-500); }

  .pg-hint { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin: 14px 2px 0; font-size: 12px; color: var(--gl-fg-3); }
  .pg-trig { display: inline-flex; align-items: center; gap: 6px; padding: 4px 9px; border: 1px solid var(--gl-border); background: var(--gl-surface); color: var(--gl-fg-2); border-radius: 999px; font-size: 11.5px; cursor: pointer; transition: .12s; }
  .pg-trig:hover { border-color: var(--gl-blue-500); color: var(--gl-fg-1); }
  .pg-trig code { font-family: var(--gl-font-mono); color: var(--gl-blue-500); font-weight: 700; }

  .pg-inspect { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 22px; }
  @media (max-width: 560px) { .pg-inspect { grid-template-columns: 1fr; } }
  .pg-inspect__h { font-size: 10.5px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--gl-fg-3); margin-bottom: 7px; }
  .pg-code { font-family: var(--gl-font-mono); font-size: 12px; line-height: 1.6; color: var(--gl-fg-2); background: var(--gl-bg); border: 1px solid var(--gl-border); border-radius: 8px; padding: 12px; min-height: 46px; word-break: break-word; white-space: pre-wrap; }
  .pg-muted { color: var(--gl-fg-4); }
  .pg-reflist { display: flex; flex-wrap: wrap; gap: 6px; background: var(--gl-bg); border: 1px solid var(--gl-border); border-radius: 8px; padding: 12px; min-height: 46px; align-content: flex-start; }
  .pg-rchip { display: inline-flex; align-items: center; gap: 5px; padding: 3px 8px; border-radius: 5px; font-size: 11.5px; font-weight: 600; color: var(--tk); background: var(--tk-bg); }
  .pg-rchip code { font-family: var(--gl-font-mono); font-size: 10px; opacity: .8; font-weight: 500; }

  /* control panel */
  .pg-panel { background: var(--gl-surface); border: 1px solid var(--gl-border); border-radius: 12px; padding: 16px; position: sticky; top: 78px; }
  .pg-panel__h { display: flex; align-items: center; gap: 8px; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--gl-fg-2); margin-bottom: 14px; }
  /* the first header doubles as a collapse toggle on mobile */
  .pg-panel__h--toggle { width: 100%; border: none; background: none; font: inherit; font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--gl-fg-2); cursor: default; padding: 0; }
  .pg-panel__chev { margin-left: auto; color: var(--gl-fg-3); transition: transform .18s ease; display: none; }
  .pg-field { margin-bottom: 16px; }
  .pg-field > label { display: block; font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--gl-fg-3); margin-bottom: 8px; }
  .pg-modes { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .pg-modebtn { display: inline-flex; align-items: center; gap: 7px; padding: 7px 9px; border: 1px solid var(--gl-border); background: var(--gl-bg); color: var(--gl-fg-2); border-radius: 7px; font-family: var(--gl-font-body); font-size: 12px; font-weight: 600; cursor: pointer; text-align: left; transition: .12s; }
  .pg-modebtn:hover { border-color: var(--gl-border-strong); color: var(--gl-fg-1); }
  .pg-modebtn.is-on { border-color: var(--gl-blue-500); color: var(--gl-blue-500); background: color-mix(in srgb, var(--gl-blue-500) 12%, transparent); }

  .pg-switch { width: 42px; height: 24px; border-radius: 999px; border: none; background: var(--gl-input-bg); position: relative; cursor: pointer; transition: .15s; }
  .pg-switch.is-on { background: var(--gl-blue-500); }
  .pg-switch__k { position: absolute; top: 3px; left: 3px; width: 18px; height: 18px; border-radius: 50%; background: #fff; transition: .15s; }
  .pg-switch.is-on .pg-switch__k { left: 21px; }

  .pg-triggers, .pg-tags { display: flex; flex-wrap: wrap; gap: 6px; }
  .pg-tg { width: 26px; height: 26px; display: grid; place-items: center; border: 1px solid var(--gl-border); border-radius: 6px; background: var(--gl-bg); }
  .pg-tg code { font-family: var(--gl-font-mono); font-size: 12px; font-weight: 700; color: var(--gl-blue-500); }
  .pg-tag { font-family: var(--gl-font-mono); font-size: 10.5px; color: var(--gl-fg-3); border: 1px solid var(--gl-border); border-radius: 5px; padding: 3px 7px; }

  .pg-log { display: flex; flex-direction: column; gap: 2px; }
  .pg-logrow { display: grid; grid-template-columns: auto 1fr; gap: 4px 8px; align-items: baseline; padding: 5px 6px; border-radius: 6px; font-size: 11.5px; }
  .pg-logrow:nth-child(odd) { background: var(--gl-bg); }
  .pg-logt { grid-row: span 2; font-family: var(--gl-font-mono); font-size: 9.5px; color: var(--gl-fg-4); }
  .pg-logname { font-family: var(--gl-font-mono); font-size: 11px; color: var(--gl-blue-500); }
  .pg-logd { color: var(--gl-fg-3); grid-column: 2; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  /* ---------- gallery ---------- */
  .pg-section-note { font-size: 14px; color: var(--gl-fg-2); max-width: 680px; margin: 0 0 24px; line-height: 1.55; }
  .pg-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(440px, 1fr)); gap: 20px; }
  @media (max-width: 520px) { .pg-gallery { grid-template-columns: 1fr; } }

  /* ---------- small-screen polish: touch targets + tightened rhythm ---------- */
  @media (max-width: 600px) {
    .pg-intro { margin-bottom: 22px; }
    .pg-lede { font-size: 14px; }
    .pg-stage-actions { flex: 1 1 auto; justify-content: flex-end; }
    .pg-mini { height: 38px; padding: 0 12px; }
    .pg-modes { grid-template-columns: 1fr; }
    .pg-modebtn { min-height: 44px; padding: 9px 12px; font-size: 13px; }
    .pg-trig { padding: 8px 12px; font-size: 12.5px; }
    .pg-switch { width: 46px; height: 28px; }
    .pg-switch__k { width: 22px; height: 22px; }
    .pg-switch.is-on .pg-switch__k { left: 21px; }
    .pg-tg { width: 30px; height: 30px; }
  }
  .pg-card { background: var(--gl-surface); border: 1px solid var(--gl-border); border-radius: 12px; padding: 16px; }
  .pg-card__h { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 14px; }
  .pg-card__ic { width: 34px; height: 34px; flex: 0 0 auto; display: grid; place-items: center; border-radius: 8px; color: var(--tk); background: var(--tk-bg); }
  .pg-card__t { font-size: 14.5px; font-weight: 700; color: var(--gl-fg-1); }
  .pg-card__d { font-size: 12px; color: var(--gl-fg-3); line-height: 1.45; margin-top: 2px; }
  .pg-card__mode { margin-left: auto; flex: 0 0 auto; font-family: var(--gl-font-mono); font-size: 10px; color: var(--gl-fg-3); border: 1px solid var(--gl-border); border-radius: 5px; padding: 3px 7px; }
  .pg-card .sc-root { box-shadow: none; }

  /* toast */
  .pg-toast { position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%); z-index: 9999; display: flex; align-items: center; gap: 9px; padding: 10px 16px; background: var(--gl-surface); border: 1px solid var(--gl-border-strong); border-radius: 10px; box-shadow: var(--gl-shadow-pop); font-size: 13px; color: var(--gl-fg-1); animation: pg-up .2s ease-out; }
  .pg-toast svg { color: var(--gl-blue-500); }
  @keyframes pg-up { from { opacity: 0; transform: translate(-50%, 8px); } }

  /* ---------- docs ---------- */
  .doc-wrap { max-width: 860px; }
  .doc-sec { margin-bottom: 40px; }
  .doc-h2 { display: flex; align-items: center; gap: 10px; font-family: var(--gl-font-body); font-weight: 700; font-size: 18px; margin: 0 0 12px; }
  .doc-h2__ic { width: 30px; height: 30px; display: grid; place-items: center; border-radius: 7px; background: color-mix(in srgb, var(--gl-blue-500) 14%, transparent); color: var(--gl-blue-500); }
  .doc-p { font-size: 14px; line-height: 1.65; color: var(--gl-fg-2); max-width: 720px; }
  .doc-p code, .doc-flow code { font-family: var(--gl-font-mono); font-size: 12.5px; color: var(--gl-blue-200); background: var(--gl-input-bg); padding: 1px 5px; border-radius: 4px; }
  .doc-code { font-family: var(--gl-font-mono); font-size: 12.5px; line-height: 1.65; background: var(--gl-bg); border: 1px solid var(--gl-border); border-radius: 10px; padding: 16px; overflow-x: auto; color: var(--gl-fg-2); margin: 14px 0; }
  .doc-code code { color: inherit; }
  .doc-arch { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 16px 0; }
  @media (max-width: 720px) { .doc-arch { grid-template-columns: 1fr; } }
  .doc-arch__c { background: var(--gl-surface); border: 1px solid var(--gl-border); border-radius: 10px; padding: 14px; }
  .doc-arch__h { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 14px; margin-bottom: 8px; }
  .doc-arch__h code { margin-left: auto; font-family: var(--gl-font-mono); font-size: 10px; color: var(--gl-fg-3); font-weight: 400; }
  .doc-arch__ic { width: 26px; height: 26px; display: grid; place-items: center; border-radius: 6px; background: var(--gl-input-bg); color: var(--gl-blue-500); }
  .doc-arch__d { font-size: 12px; line-height: 1.5; color: var(--gl-fg-3); }
  .doc-flow { font-size: 12.5px; color: var(--gl-fg-3); line-height: 2.2; background: var(--gl-bg); border: 1px solid var(--gl-border); border-radius: 8px; padding: 12px 14px; }
  .doc-flow b { color: var(--gl-blue-200); font-weight: 600; }
  .doc-cbs, .doc-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .doc-cb { font-family: var(--gl-font-mono); font-size: 11.5px; color: var(--gl-fg-2); background: var(--gl-surface); border: 1px solid var(--gl-border); border-radius: 6px; padding: 4px 8px; }
  .doc-cols { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 8px; }
  @media (max-width: 720px) { .doc-cols { grid-template-columns: 1fr; } }
  .doc-coltitle { font-size: 10.5px; font-weight: 700; letter-spacing: .06em; text-transform: uppercase; color: var(--gl-fg-3); margin-bottom: 8px; }
  .doc-foot { font-family: var(--gl-font-mono); font-size: 10px; letter-spacing: .08em; color: var(--gl-fg-4); margin-top: 24px; padding-top: 16px; border-top: 1px solid var(--gl-border); }

  /* ---------- encoding tab ---------- */
  .enc-wrap { max-width: 1100px; }
  .enc-mut { color: var(--gl-fg-3); font-weight: 500; }
  .enc-anat { background: var(--gl-surface); border: 1px solid var(--gl-border); border-radius: 12px; padding: 18px; margin-bottom: 22px; }
  .enc-anat__fmt { font-family: var(--gl-font-mono); font-size: 15px; font-weight: 600; margin-bottom: 16px; word-break: break-word; }
  .enc-anat__grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  @media (max-width: 720px) { .enc-anat__grid { grid-template-columns: 1fr 1fr; } }
  .enc-anat__c { background: var(--gl-bg); border: 1px solid var(--gl-border); border-left: 3px solid var(--tk); border-radius: 6px; padding: 10px 12px; }
  .enc-anat__k { font-size: 10px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--tk); }
  .enc-anat__v { display: block; font-family: var(--gl-font-mono); font-size: 12px; color: var(--gl-fg-1); margin: 5px 0 4px; word-break: break-all; }
  .enc-anat__d { font-size: 11px; color: var(--gl-fg-3); line-height: 1.4; }

  .enc-split { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 860px) { .enc-split { grid-template-columns: 1fr; } }
  .enc-pane { background: var(--gl-surface); border: 1px solid var(--gl-border); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
  .enc-pane__h { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 10px 14px; border-bottom: 1px solid var(--gl-border); font-size: 12px; font-weight: 600; color: var(--gl-fg-2); }
  .enc-pane__h svg { vertical-align: -2px; }
  .enc-ta { flex: 1; min-height: 240px; resize: vertical; border: none; outline: none; background: var(--gl-bg); color: var(--gl-fg-2); font-family: var(--gl-font-mono); font-size: 12.5px; line-height: 1.7; padding: 14px; }
  .enc-preview { padding: 16px; min-height: 150px; }
  .enc-styles { display: flex; flex-wrap: wrap; gap: 3px; }
  .enc-style { border: 1px solid transparent; background: none; color: var(--gl-fg-3); font-family: var(--gl-font-mono); font-size: 10.5px; padding: 3px 7px; border-radius: 5px; cursor: pointer; }
  .enc-style:hover { color: var(--gl-fg-1); background: var(--gl-hover); }
  .enc-style.is-on { color: var(--gl-blue-500); border-color: var(--gl-blue-500); }
  .enc-controls { display: flex; align-items: center; gap: 10px; padding: 0 16px 14px; }
  .enc-plain { padding: 12px 16px; border-top: 1px solid var(--gl-border); font-size: 13px; color: var(--gl-fg-2); line-height: 1.5; }
  .enc-plain__k { font-family: var(--gl-font-mono); font-size: 11px; color: var(--gl-fg-3); }

  .enc-rt { margin-top: 24px; }
  .enc-states { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 14px; }
  .enc-state { background: var(--gl-surface); border: 1px solid var(--gl-border); border-radius: 10px; padding: 14px; }
  .enc-state__t { font-size: 12px; font-weight: 700; color: var(--gl-fg-1); margin-bottom: 10px; }
  .enc-state__pv { min-height: 30px; margin-bottom: 10px; }
  .enc-state__d { font-size: 11.5px; color: var(--gl-fg-3); line-height: 1.45; margin-bottom: 8px; }
  .enc-state__code { display: block; font-family: var(--gl-font-mono); font-size: 10px; color: var(--gl-fg-4); word-break: break-all; line-height: 1.4; }
